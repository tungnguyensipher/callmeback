project_name: callmeback

builds:
  - id: callmeback
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    main: ./cmd/callmeback
    binary: callmeback
    ldflags:
      - >-
        -s -w
        -X github.com/tungnguyensipher/callmeback/internal/buildinfo.Version={{ .Version }}
        -X github.com/tungnguyensipher/callmeback/internal/buildinfo.Commit={{ .Commit }}
        -X github.com/tungnguyensipher/callmeback/internal/buildinfo.BuildDate={{ .Date }}

archives:
  - id: callmeback
    builds:
      - callmeback
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - install.sh
      - install.ps1
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
