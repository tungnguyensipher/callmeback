name: pr-test-build

on:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Generate build metadata
        run: |
          echo VERSION=$(git describe --tags --always --dirty) >> "$GITHUB_ENV"
          echo COMMIT=$(git rev-parse --short HEAD) >> "$GITHUB_ENV"
          echo BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) >> "$GITHUB_ENV"

      - name: Build
        run: |
          go build \
            -ldflags "-X github.com/tungnguyensipher/callmeback/internal/buildinfo.Version=${VERSION} -X github.com/tungnguyensipher/callmeback/internal/buildinfo.Commit=${COMMIT} -X github.com/tungnguyensipher/callmeback/internal/buildinfo.BuildDate=${BUILD_DATE}" \
            -o test-output ./cmd/callmeback
          rm -f test-output
